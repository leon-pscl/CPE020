<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Phishing Text Analyzer</h2>
    <p>Paste the text of the email or message below to check if it's <strong>Phishing</strong> or <strong>Safe</strong></p>
    
    <label class="input-label" for="inputText">Enter Text:</label>
    <textarea id="inputText"></textarea>
    
    <button id="analyzeBtn">Check</button>
    
    <div id="result" class="result-box"></div>
</div>

<script src="script.js"></script>

</body>
</html>
